services:
  - type: web
    name: propscope-api
    env: python
    region: singapore        # 한국에서 가장 가까운 리전
    plan: free
    rootDir: propscope
    buildCommand: >
      pip install -r requirements.txt &&
      playwright install chromium --with-deps
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
